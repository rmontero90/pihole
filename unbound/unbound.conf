server:
    verbosity: 1
    interface: 0.0.0.0
    port: 5335
    do-ip4: yes
    do-ip6: no
    do-udp: yes
    do-tcp: yes

    # Only accept queries from Pi-hole container
    access-control: 172.20.0.0/29 allow
    access-control: 0.0.0.0/0 refuse

    # Root hints (Unbound ships these, but explicit is safer)
    root-hints: "/opt/unbound/etc/unbound/root.hints"

    # Hardening
    hide-identity: yes
    hide-version: yes
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-below-nxdomain: yes
    use-caps-for-id: yes
    val-clean-additional: yes

    # Performance
    edns-buffer-size: 1232
    prefetch: yes
    prefetch-key: yes
    num-threads: 2
    msg-cache-slabs: 2
    rrset-cache-slabs: 2
    infra-cache-slabs: 2
    key-cache-slabs: 2
    rrset-cache-size: 256m
    msg-cache-size: 128m
    so-rcvbuf: 1m
    serve-expired: yes
    serve-expired-ttl: 3600

    # DNSSEC
    auto-trust-anchor-file: "/opt/unbound/etc/unbound/var/root.key"
    val-log-level: 1

    # Private reverse zones (don't leak to internet)
    private-address: 192.168.0.0/16
    private-address: 172.16.0.0/12
    private-address: 10.0.0.0/8